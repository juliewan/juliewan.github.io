<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>julie-in-the-loop — 404</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/marie-favicon.png">
<link rel="stylesheet" href="/assets/site.css">
<style>
  body {
    background-color: #fff0f0;
    color: #544b45;
  }

  .nf {
    min-height: 100vh;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    gap: 20px;
  }

  .nf pre {
    margin: 0;
    /* deliberately proportional: variable-width glyphs and narrow spaces
       compress each row differently, warping the block art into groovy
       rounded digits (the accidental no-css preview look, kept on purpose) */
    font-family: 'Times New Roman', Times, serif;
    color: #544b45;
    font-size: clamp(8px, 3.2vw, 22px);
    line-height: 1.1;
    white-space: pre;
  }

  .nf p {
    margin: 0;
    font-size: 15px;
    color: #544b45;
  }

  .nf-links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 20px;
    justify-content: center;
    font-size: 14px;
  }

  .nf-links a {
    color: #544b45;
    text-decoration: none;
  }

  .nf-links a:hover {
    text-decoration: underline;
  }
</style>
</head>

  <main class="nf">

    </div>
  </main>
</body>
</html>
